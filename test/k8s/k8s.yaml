apiVersion: v1
kind: Namespace
metadata:
  name: socketio-cluster-e2e
---
apiVersion: v1
kind: Service
metadata:
  name: socketio-k8s-e2e
  namespace: socketio-cluster-e2e
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: socketio-k8s-e2e
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socketio-k8s-e2e
  namespace: socketio-cluster-e2e
spec:
  replicas: 2
  selector:
    matchLabels:
      app: socketio-k8s-e2e
  template:
    metadata:
      labels:
        app: socketio-k8s-e2e
    spec:
      containers:
        - name: server
          image: socketio-cluster-k8s-e2e:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /debug/info
              port: http
            initialDelaySeconds: 1
            periodSeconds: 1
